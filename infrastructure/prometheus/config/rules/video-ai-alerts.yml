groups:
  - name: video-ai-alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"

      - alert: HighProcessingLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency on {{ $labels.service }}"
          description: "P95 latency is above 5 seconds"

      - alert: WorkflowFailureRate
        expr: rate(workflow_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High workflow failure rate"
          description: "More than 10% of workflows are failing"

      - alert: AlarmOpenRate
        expr: rate(alarm_open_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High alarm rate"
          description: "More than 30 alarms per minute"

      - alert: DatabaseConnectionError
        expr: rate(pg_stat_activity_count[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection errors"
          description: "PostgreSQL connection errors detected"

      - alert: KafkaLagHigh
        expr: kafka_consumer_group_lag > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer lag is above 100 messages"

  - name: node-alerts
    interval: 30s
    rules:
      - alert: NodeDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node exporter is down"
          description: "Node exporter has been unreachable for 1 minute"

      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for 5 minutes"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% for 5 minutes"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Root filesystem has less than 10% free space"

      - alert: HighDiskIO
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk I/O on {{ $labels.instance }}"
          description: "Disk I/O utilization is above 80%"

      - alert: NetworkIssues
        expr: rate(node_network_receive_errs_total[5m]) > 0 or rate(node_network_transmit_errs_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Network errors on {{ $labels.instance }}"
          description: "Network interface has errors"

  - name: gpu-alerts
    interval: 30s
    rules:
      - alert: GPUDown
        expr: up{job="gpu"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "GPU exporter is down"
          description: "GPU has been unreachable for 1 minute"

      - alert: GPUMemoryHigh
        expr: DCGM_FI_DEV_MEM_USED_TOTAL / DCGM_FI_DEV_MEM_TOTAL * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU memory usage high"
          description: "GPU memory usage is above 90%"

      - alert: GPUUtilizationHigh
        expr: DCGM_FI_DEV_GPU_UTIL > 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU utilization high"
          description: "GPU utilization is above 95%"

      - alert: GPUTemperatureHigh
        expr: DCGM_FI_DEV_GPU_TEMP > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature high"
          description: "GPU temperature is above 85C"

      - alert: GPUPowerHigh
        expr: DCGM_FI_DEV_POWER_USAGE / DCGM_FI_DEV_POWER_LIMIT * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU power usage high"
          description: "GPU power usage is above 90% of limit"

  - name: kubernetes-alerts
    interval: 30s
    rules:
      - alert: KubeStateMetricsDown
        expr: up{job="kube-state-metrics"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Kube State Metrics is down"
          description: "Kube State Metrics has been unreachable for 1 minute"

      - alert: KubeletDown
        expr: up{job="kubelet"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kubelet is down"
          description: "Kubelet has been unreachable for 1 minute"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 6 times in 15 minutes"

      - alert: PodPending
        expr: kube_pod_status_phase{phase="Pending"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is pending"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been pending for more than 5 minutes"

      - alert: PodFailed
        expr: kube_pod_status_phase{phase="Failed"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} has failed"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has failed"

      - alert: DeploymentReplicasMismatch
        expr: kube_deployment_status_replicas_ready / kube_deployment_spec_replicas * 100 < 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.deployment }} replicas mismatch"
          description: "Deployment {{ $labels.deployment }} has {{ $value }}% of desired replicas ready"

      - alert: StatefulSetReplicasMismatch
        expr: kube_statefulset_status_replicas_ready / kube_statefulset_spec_replicas * 100 < 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "StatefulSet {{ $labels.statefulset }} replicas mismatch"
          description: "StatefulSet {{ $labels.statefulset }} has {{ $value }}% of desired replicas ready"

      - alert: HPAReplicasMaxedOut
        expr: kube_horizontalpodautoscaler_status_desired_replicas >= kube_horizontalpodautoscaler_spec_max_replicas
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} is maxed out"
          description: "HPA {{ $labels.horizontalpodautoscaler }} has reached maximum replicas"

      - alert: PVCPendingDeletion
        expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PVC {{ $labels.persistentvolumeclaim }} pending deletion"
          description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is pending deletion"

      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status!="true"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been not ready for 1 minute"

      - alert: NodeOutOfDisk
        expr: kube_node_status_condition{condition="OutOfDisk",status="true"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is out of disk"
          description: "Node {{ $labels.node }} is out of disk"

      - alert: NodeMemoryPressure
        expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} has memory pressure"
          description: "Node {{ $labels.node }} is experiencing memory pressure"

      - alert: NodeDiskPressure
        expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} has disk pressure"
          description: "Node {{ $labels.node }} is experiencing disk pressure"

      - alert: API-server down
        expr: up{job="kube-apiserver"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kubernetes API server is down"
          description: "Kubernetes API server has been unreachable for 1 minute"

      - alert: SchedulerDown
        expr: up{job="kube-scheduler"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kubernetes scheduler is down"
          description: "Kubernetes scheduler has been unreachable for 1 minute"

      - alert: ControllerManagerDown
        expr: up{job="kube-controller-manager"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kubernetes controller manager is down"
          description: "Kubernetes controller manager has been unreachable for 1 minute"