apiVersion: v1
kind: Secret
metadata:
  name: video-ai-secrets
  namespace: video-ai
type: Opaque
stringData:
  minio-access-key: minioadmin
  minio-secret-key: minioadmin
  session-secret: your-session-secret-change-in-production
  postgres-password: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage-pvc
  namespace: video-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard