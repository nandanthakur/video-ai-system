version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/config:/etc/prometheus
      - prometheus-data:/prometheus
    networks:
      - video-ai-net

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/alertmanager/config:/etc/alertmanager
      - alertmanager-data:/alertmanager
    networks:
      - video-ai-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - video-ai-net
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    command:
      - '-config.file=/etc/loki/loki.yml'
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/config:/etc/loki
      - loki-data:/loki
    networks:
      - video-ai-net

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - video-ai-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:postgres@postgres:5432/video_ai
    ports:
      - "9187:9187"
    networks:
      - video-ai-net

  kafka-exporter:
    image: danielqsj/kafka_exporter:v1.7.0
    container_name: kafka-exporter
    command:
      - --kafka.brokers=kafka:9092
      - --kafka.version=3.6
    ports:
      - "9308:9308"
    networks:
      - video-ai-net

  nvidia-dcgm-exporter:
    image: nvcr.io/nvidia/dcgm-exporter:3.3.0
    container_name: nvidia-dcgm-exporter
    ports:
      - "9400:9400"
    volumes:
      - /var/lib/nvidia/dcgm:/var/lib/nvidia/dcgm:ro
    networks:
      - video-ai-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      - NOTIFICATION_SERVICE_PORT=9000
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    ports:
      - "9000:9000"
    networks:
      - video-ai-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - video-ai-net
    depends_on:
      - prometheus
      - grafana
      - alertmanager
      - loki

  kube-state-metrics:
    image: prom/kube-state-metrics:v2.10.0
    container_name: kube-state-metrics
    ports:
      - "8080:8080"
    networks:
      - video-ai-net

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  loki-data:

networks:
  video-ai-net:
    driver: bridge