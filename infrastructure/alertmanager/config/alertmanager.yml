global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager'
  smtp_auth_password: 'changeme'

route:
  group_by: ['alertname', 'cluster']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts-teams'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts-teams'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://web-app:8005/webhooks/alerts'
        send_resolved: true

  - name: 'critical-alerts-teams'
    webhook_configs:
      - url: 'http://notification-service:9000/webhook/teams'
        send_resolved: true

  - name: 'warning-alerts-teams'
    webhook_configs:
      - url: 'http://notification-service:9000/webhook/teams'
        send_resolved: true

  - name: 'critical-alerts-slack'
    slack_configs:
      - channel: '#alerts-critical'
        api_url: 'https://hooks.slack.com/services/xxxxx'
        send_resolved: true
        title: '🚨 Critical Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'HighProcessingLatency'
    equal: ['cluster', 'job']

  - source_match:
      alertname: 'DatabaseConnectionError'
    target_match:
      alertname: 'HighProcessingLatency'
    equal: ['cluster']