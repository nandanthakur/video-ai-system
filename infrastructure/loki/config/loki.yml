auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  max_old_stale_age: 168h
  ingestion_rate_mb: 50
  ingestion_burst_size_mb: 20

pattern_ingester:
  metric:
    enabled: true

  logs:
    enabled: true

service_discovery:
  scrape_configs:
    - job_name: vms-bridge
      static_configs:
        - targets: [vms-bridge:8001]
          labels:
            service: vms-bridge

    - job_name: primary-api
      static_configs:
        - targets: [primary-api:8000]
          labels:
            service: primary-api

    - job_name: temporal
      static_configs:
        - targets: [temporal:7233]
          labels:
            service: temporal

    - job_name: web-app
      static_configs:
        - targets: [web-app:8005]
          labels:
            service: web-app