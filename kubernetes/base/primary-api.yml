apiVersion: apps/v1
kind: Deployment
metadata:
  name: primary-api
  namespace: video-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: primary-api
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: primary-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: primary-api
          image: video-ai/primary-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MINIO_HOST
              value: "minio"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          envFrom:
            - configMapRef:
                name: video-ai-config
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: primary-api
  namespace: video-ai
spec:
  selector:
    app: primary-api
  ports:
    - port: 8000
      targetPort: 8000
  sessionAffinity: None
  type: ClusterIP
  publishNotReadyAddresses: false